<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Generador de Avatares Premium impulsado por IA. Crea ilustraciones profesionales en segundos.">
    <meta name="keywords" content="IA, OpenAI, DALL-E, Avatares, Generador de Imágenes, Portafolio">
    <meta name="author" content="JesusBustos">
    
    <!-- Open Graph Tags (Para redes sociales) -->
    <meta property="og:title" content="Avatares con IA - Premium">
    <meta property="og:description" content="Generador de Avatares Premium impulsado por IA. Crea ilustraciones profesionales en segundos.">
    <meta property="og:image" content="/Assets/Imgs/imagenes-de-usuario.png">
    <meta property="og:url" content="URL_DEL_PROYECTO">
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./Assets/CSS/styles.css"/>
    <link rel="icon" type="image/png" href="./Assets/Imgs/imagenes-de-usuario.png"/>
    <script src="./Assets/JS/main.js" defer></script>
    <title>Avatares Premium | IA</title>
</head>

<body>

    <main class="layout">

        <section class="layout__container">

            <header class="container__header">
                <h1 class="header__title">Generador de Avatares IA</h1>
            </header>

            <div class="container__avatar" aria-live="polite">
                <!-- Efecto visual de carga o estado inicial -->
                <div class="initial-state">
                    <img src="./Assets/Imgs/imagenes-de-usuario.png" alt="Avatar Placeholder" class="placeholder-img">
                </div>
                <div class="loading-overlay" style="display: none;">
                    <div class="spinner"></div>
                    <p>Creando arte...</p>
                </div>
            </div>

            <section class="container__controls">
                
                <div class="input-group">
                    <label for="category-select" class="visually-hidden">Selecciona el tipo de avatar:</label>
                    <select id="category-select" class="category" aria-label="Categoría del avatar">
                        <option value="hombre">Hombre</option>
                        <option value="mujer">Mujer</option>
                        <option value="niño">Niño</option>
                        <option value="anciano">Anciano</option>
                        <option value="animal">Animal</option>
                    </select>
                </div>
                
                <button class="button" id="generate-btn">
                    <span>Generar con IA</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-zap"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
                </button>

                <button class="button download-btn" id="download-btn" style="display: none; margin-top: 10px; background: #2563eb;">
                    <span>Descargar Avatar</span>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-download"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </button>

            </section>
            
            <footer class="container__footer">
                <div class="limit-tracker">
                    <p>Peticiones restantes (Dispositivo): <strong id="limit-counter">3</strong>/3</p>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                </div>
            </footer>

        </section>

    </main>

</body>

</html>
